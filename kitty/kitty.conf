# ============================================
# Kitty Configuration
# ============================================
# Profil: Toyota Tercel - Minimal, fonctionnel, maîtrisé
# Thème: Dracula
# Police: MesloLGS NF (compatibilité powerlevel10k)
# Layout: Optimisé pour workflow OpenCode (code à gauche, terminal à droite)
# ============================================

# ============================================
# FONTS
# ============================================
# MesloLGS NF = police recommandée par powerlevel10k avec ligatures et icônes
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto

# Taille de police adaptée pour écran 27" + laptop
font_size 11.0

# Améliorations de rendu
adjust_line_height  0
adjust_column_width 0

# ============================================
# CURSEUR
# ============================================
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# ============================================
# FENÊTRE / APPARENCE
# ============================================
# Fenêtre native KDE (respecte le thème système)
hide_window_decorations no

# Titre de fenêtre informatif
# Note: window_title_template n'est pas supporté dans Kitty 0.41.1 (Debian repos)
# window_title_template "{title} - Kitty"

# Marges pour aérer le contenu (surtout utile en split-screen)
window_margin_width 2
window_padding_width 4

# Opacité légère (optionnel, commenté par défaut)
# background_opacity 0.95

# ============================================
# SCROLLBACK
# ============================================
# Historique de scrollback généreux pour les logs
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS

# ============================================
# CLAVIER / RACCOURCIS
# ============================================
# Raccourcis standards Kitty (pas d'harmonisation tmux pour garder la simplicité)

# Onglets
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Fenêtres (splits)
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Layouts
map ctrl+shift+l next_layout

# Copier/Coller (intégration clipboard système)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Zoom
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0

# ============================================
# CLIC SOURIS
# ============================================
# Ouvrir les URLs au clic
mouse_map ctrl+left release ungrabbed,grabbed mouse_click_url

# Copie automatique sur sélection
copy_on_select yes

# Clic droit pour coller (intégration presse-papiers système)
mouse_map right press ungrabbed,grabbed paste_from_clipboard

# ============================================
# SONNERIE / BELL
# ============================================
# Désactiver la cloche visuelle et sonore
enable_audio_bell no
visual_bell_duration 0.0

# ============================================
# PERFORMANCE
# ============================================
# GPU acceleration (kitty est GPU-accéléré par défaut)
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ============================================
# THÈME: DRACULA
# ============================================
# Import du thème Dracula depuis fichier séparé
include themes/dracula.conf

# ============================================
# DÉTECTION ENVIRONNEMENT
# ============================================
# Détection automatique du shell (zsh/bash)
shell .

# Conserver le répertoire courant lors de l'ouverture d'un nouvel onglet
# Note: dynamic_title n'est pas supporté dans Kitty 0.41.1 (Debian repos)
# dynamic_title yes

# ============================================
# OPENCODE / WORKFLOW SPLIT-SCREEN
# ============================================
# Configuration optimisée pour layout côte-à-côte avec VS Code

# Taille minimale de fenêtre pour split confortable
remember_window_size yes
initial_window_width  100c
initial_window_height 30c

# ============================================
# NOTES POUR L'UTILISATEUR
# ============================================
# Ce fichier est géré via SYMLINK depuis le repo infra-startup.
# Modifications: Éditer dans VS Code (05-DESKTOPS/kitty/kitty.conf)
# Application: Kitty recharge auto ou Ctrl+Shift+F5
# Documentation: https://sw.kovidgoyal.net/kitty/conf/

# ============================================
# OPENCODE SHORTCUTS
# ============================================
# Intégration avec OpenCode CLI et OpenAgentsControl

# Lancer OpenCode dans un nouvel onglet
map ctrl+shift+o launch --type=tab opencode

# Lancer OpenCode avec un agent prédéfini
map ctrl+shift+a launch --type=tab opencode --agent OpenAgent

# Lancer OpenCode dans une nouvelle fenêtre (pour split-screen manuel)
map ctrl+shift+alt+o launch opencode

# Variable d'environnement pour OpenCode
env OPENCODE_CONFIG_DIR=${HOME}/.config/opencode
